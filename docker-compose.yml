version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investment-backend
    restart: unless-stopped
    # 仅绑定 localhost，由宿主机 Nginx 反向代理
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - investment-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: investment-frontend
    restart: unless-stopped
    # 仅绑定 localhost，由宿主机 Nginx 反向代理
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - investment-network

networks:
  investment-network:
    driver: bridge
