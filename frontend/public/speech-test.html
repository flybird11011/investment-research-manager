<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音播报测试</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    .card { background: white; padding: 24px; border-radius: 12px; max-width: 560px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; margin-bottom: 16px; }
    textarea { width: 100%; min-height: 120px; padding: 12px; font-size: 14px; border: 1px solid #d1d5db; border-radius: 8px; resize: vertical; box-sizing: border-box; }
    button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin: 4px 4px 4px 0; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    #log { margin-top: 16px; padding: 12px; background: #1e293b; color: #22c55e; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    .info { color: #64748b; font-size: 13px; margin-top: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔊 后端 TTS 测试</h1>

    <textarea id="textInput">你好，这是一段语音测试。现在使用的是后端生成音频的方案，不再依赖浏览器本地语音引擎。</textarea>

    <div style="margin-top: 12px;">
      <button class="btn-primary" onclick="playSpeech()">生成并播放</button>
      <button class="btn-danger" onclick="stopSpeech()">停止</button>
    </div>

    <div id="log">等待测试...</div>
    <div class="info">
      说明：这个页面会请求后端 `/api/audio/speech` 接口，由服务器生成 mp3 后再播放。<br>
      如果这里可以响，说明 VPS 端的 edge-tts 链路是通的。
    </div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    let currentAudio = null;
    let currentObjectUrl = null;
    let currentAbortController = null;

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    function cleanup() {
      if (currentAbortController) {
        currentAbortController.abort();
        currentAbortController = null;
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.src = '';
        currentAudio = null;
      }
      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }
    }

    async function playSpeech() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) {
        log('请输入要朗读的文本');
        return;
      }

      cleanup();
      const controller = new AbortController();
      currentAbortController = controller;
      log('开始请求后端生成音频...');

      try {
        const response = await fetch('/api/audio/speech', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
          signal: controller.signal,
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => null);
          throw new Error(payload?.error || `HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        const audio = new Audio(objectUrl);

        currentObjectUrl = objectUrl;
        currentAudio = audio;

        audio.onended = () => {
          log('✅ 播放结束');
          cleanup();
        };

        audio.onerror = () => {
          log('❌ 播放失败');
          cleanup();
        };

        await audio.play();
        log('✅ 开始播放');
      } catch (error) {
        if (error && error.name === 'AbortError') return;
        log('❌ 语音生成失败: ' + (error && error.message ? error.message : String(error)));
        cleanup();
      }
    }

    function stopSpeech() {
      cleanup();
      log('已停止');
    }
  </script>
</body>
</html>
